<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BYU Idaho WDD 131 – Dynamic Web Fundamentals Class, Page with Brazilian Data">
    <meta name="author" content="João Guilherme Aguiar Moreira">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles/form.css">

    <script src="scripts/form.js" defer></script>
    <script src="scripts/getdates.js" defer></script>
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    
    <main>
        <form action="review.html">
            <label for="product">Product Name</label>
            <select name="product" id="product" required>
                <option value="" disabled selected>Choose a product</option>
            </select>

            <label for="rating">Overall Rating</label>
            <div class="radio-group" id="rating">
                <div>
                    <label for="1-star"><i class="fa-regular fa-star"></i></label>
                    <input type="radio" id="1-star" name="rating" value="1" required>
                </div>

                <div>
                    <label for="2-star">
                        <i class="fa-regular fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                    </label>
                    <input type="radio" id="2-star" name="rating" value="2" required>
                </div>

                <div>
                    <label for="3-star">
                        <i class="fa-regular fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                    </label>
                    <input type="radio" id="3-star" name="rating" value="3" required>
                </div>

                <div>
                    <label for="4-star">
                        <i class="fa-regular fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                    </label>
                    <input type="radio" id="4-star" name="rating" value="4" required>
                </div>

                <div>
                    <label for="5-star">
                        <i class="fa-regular fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                    </label>
                    <input type="radio" id="5-star" name="rating" value="5" required>
                </div>
            </div>

            <label for="date">Date of Installation</label>
            <input type="date" id="date" name="date" required>

            <label for="features">
                Which features did you find useful in the product?<br>
                <em>(Check all that apply)</em>
            </label>
            <div class="checkbox-group" id="features">
                <span>
                    <input type="checkbox" id="durability" name="features" value="durability">
                    <label for="durability">Durability</label>
                </span>

                <span>
                    <input type="checkbox" id="ease" name="features" value="ease">
                    <label for="ease">Ease of use</label>
                </span>

                <span>
                    <input type="checkbox" id="performance" name="features" value="performance">
                    <label for="performance">Performance</label>
                </span>

                <span>
                    <input type="checkbox" id="design" name="features" value="design">
                    <label for="design">Design</label>
                </span>
            </div>

            <label for="review" class="optional">Written Review</label>
            <textarea id="review" name="review"></textarea>

            <label for="name" class="optional">Your Name</label>
            <input type="text" id="name" name="name">

            <input type="submit" value="Post Review">
        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span>🌴 João Guilherme Aguiar Moreira 🌴 Brazil</p>
        <p class="last-modification">Last Modification: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
